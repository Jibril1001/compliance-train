version: '3.9'

services:
  mongo:
    image: mongo:6
    container_name: compliance-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./server
    container_name: compliance-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/compliance_db
      - JWT_SECRET=supersecretkeyyugerhfd
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: compliance-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_PORT=5173
      - VITE_API_URL=http://localhost:4000/api
    depends_on:
      - backend

volumes:
  mongo-data: